name: Deploy NestJS Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Sync files to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          # EXCLUDE qismini kuchaytiramiz, muammoli papkalarni chetlab o'tamiz
          exclude: |
            **/node_modules/**
            src/**
            test/**
            .git/**
            .github/**
            *.ts
            tsconfig.json
            nest-cli.json
            README.md
            .prettierrc
            eslint.config.mjs
            uploads/**
            dist.zip